name: Publish Package

on:
  push:
    tags:
      - v*
      - vite-plugin-dts@*

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.repository == 'qmhc/unplugin-dts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Build
        run: pnpm run build

      - name: Publish package
        run: pnpm run publish:ci ${{ github.ref_name }}
        env:
          NODE_OPTIONS: --max-old-space-size=4096
